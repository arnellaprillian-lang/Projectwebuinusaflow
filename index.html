<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>NusaFlow Koi | RDF Control</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px 12px 32px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    /* Card glassmorphism ungu transparan */
    .card {
      background: rgba(30, 40, 70, 0.55);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 0.5px solid rgba(150, 120, 255, 0.4);
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      padding: 18px;
      margin-bottom: 16px;
    }

    /* Header dengan jam */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      gap: 12px;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header p {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .clock {
      text-align: right;
    }
    .clock-time {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .clock-date {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    /* Segmented control (iOS style) */
    .segmented-control {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 40px;
      padding: 4px;
      gap: 4px;
    }
    .segmented-control button {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 6px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .segmented-control button.active {
      background: #7c3aed;
      box-shadow: 0 2px 6px rgba(124, 58, 237, 0.4);
    }
    .segmented-control button:active {
      transform: scale(0.96);
    }

    /* Tombol umum */
    button {
      background: rgba(255, 255, 255, 0.12);
      border: none;
      border-radius: 40px;
      padding: 10px 16px;
      color: white;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    button:active { transform: scale(0.96); }
    .btn-primary { background: #7c3aed; }
    .btn-danger { background: #dc2626; }
    .btn-warning { background: #f59e0b; }
    .emergency { animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
      50% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
    }

    /* Sensor grid */
    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    @media (min-width: 480px) {
      .sensor-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .sensor-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 10px 6px;
      text-align: center;
      transition: 0.2s;
    }
    .sensor-value {
      font-size: clamp(1.2rem, 6vw, 1.5rem);
      font-weight: 700;
      margin-top: 4px;
    }

    /* Katalog produk grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 8px;
    }
    .product-card {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .product-card:active { transform: scale(0.96); }
    .product-card img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      margin-bottom: 6px;
    }

    /* Log area */
    .log-area {
      max-height: 180px;
      overflow-y: auto;
      font-size: 0.7rem;
    }
    .log-item {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 6px 0;
      display: flex;
      gap: 8px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      left: auto;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      border-left: 3px solid;
      max-width: 85%;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Loading */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1a1a2e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.5s;
    }
    .loading-content { text-align: center; }
    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .loading-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #7c3aed);
      transition: width 0.2s;
    }

    /* Alarm blink */
    .blink-red {
      animation: blink 0.5s step-end infinite alternate;
    }
    @keyframes blink {
      from { background: rgba(239,68,68,0.3); border-color: #ef4444; }
      to { background: rgba(239,68,68,0.8); border-color: #dc2626; }
    }

    /* Input & select */
    input, select {
      background: rgba(0, 0, 0, 0.4);
      border: none;
      border-radius: 40px;
      padding: 8px 12px;
      color: white;
      font-size: 0.8rem;
    }
    input:focus, select:focus { outline: none; }

    /* Action buttons (Reset, Threshold, Export) - terpisah dari kolom monitoring */
    .action-group {
      display: flex;
      gap: 12px;
      margin: 8px 0 20px 0;
    }
    .action-group button {
      flex: 1;
    }
  </style>
</head>
<body>

<div id="loading" class="loading-screen">
  <div class="loading-content">
    <div style="font-size:2.2rem; font-weight:800;">NUSA<span style="color:#a855f7;">FLOW</span></div>
    <div style="font-size:0.7rem; opacity:0.7;">Koi Pond RDF System</div>
    <div class="loading-bar"><div id="loadProgress" class="loading-progress"></div></div>
    <div style="margin-top:8px;" id="loadPercent">0%</div>
  </div>
</div>

<div id="app" style="opacity:0; transition: opacity 0.6s;"></div>

<script>
  (function() {
    // ========== LOADING ==========
    let prog = 0;
    const loadBar = document.getElementById('loadProgress');
    const loadPercent = document.getElementById('loadPercent');
    const loadingDiv = document.getElementById('loading');
    const interval = setInterval(() => {
      prog += Math.random() * 12 + 5;
      if (prog >= 100) {
        prog = 100;
        clearInterval(interval);
        setTimeout(() => {
          loadingDiv.style.opacity = '0';
          setTimeout(() => {
            loadingDiv.style.display = 'none';
            document.getElementById('app').style.opacity = '1';
          }, 500);
        }, 400);
      }
      if (loadBar) loadBar.style.width = Math.min(prog,100) + '%';
      if (loadPercent) loadPercent.innerText = Math.floor(Math.min(prog,100)) + '%';
    }, 150);

    // ========== STATE ==========
    let state = {
      rdfOn: false,
      pumpOnly: false,
      drumOnly: false,
      aeratorOn: false,
      uvOn: false,
      schedules: [],
      waterLevel: 'MEDIUM',
      drumCurrent: 0.8,
      voltage: 12.3,
      flowRate: 85,
      waterTemp: 26.5,
      ph: 7.2,
      power: 0,
      thresholds: { maxCurrent: 2.5, minPh: 6.0, maxPh: 8.5, maxTemp: 32 },
      logs: [],
      notifications: [],
      tempHistory: Array(20).fill(26.5),
      phHistory: Array(20).fill(7.2),
      voltHistory: Array(20).fill(12.3),
      espConnected: true
    };

    let chart = null;
    let sensorInterval = null;
    let scheduleInterval = null;
    let clockInterval = null;

    // ========== HELPER ==========
    function addLog(action, detail) {
      const time = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      state.logs = [{ id: Date.now(), time, action, detail }, ...state.logs].slice(0, 50);
      updateLogUI();
    }
    function addNotif(msg, type='info') {
      const id = Date.now();
      state.notifications.push({ id, msg, type });
      updateNotifUI();
      if (type === 'error') beep();
      setTimeout(() => {
        state.notifications = state.notifications.filter(n => n.id !== id);
        updateNotifUI();
      }, 4000);
    }
    function beep() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.15;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.4);
        osc.stop(audio.currentTime + 0.4);
      } catch(e) {}
    }

    // Jam realtime
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      const dateStr = now.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
      const clockTime = document.getElementById('clockTime');
      const clockDate = document.getElementById('clockDate');
      if (clockTime) clockTime.innerText = timeStr;
      if (clockDate) clockDate.innerText = dateStr;
    }

    // ========== CHART ==========
    function initChart() {
      const ctx = document.getElementById('trendChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array(20).fill(''),
          datasets: [
            { label: 'Suhu °C', data: state.tempHistory, borderColor: '#f97316', tension: 0.2, fill: false },
            { label: 'pH', data: state.phHistory, borderColor: '#a855f7', tension: 0.2, fill: false, yAxisID: 'y1' },
            { label: 'Tegangan V', data: state.voltHistory, borderColor: '#3b82f6', tension: 0.2, fill: false }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top', labels: { color: '#fff' } } },
          scales: {
            y: { title: { display: true, text: 'Suhu/Tegangan', color: '#aaa' }, ticks: { color: '#ddd' } },
            y1: { position: 'right', title: { text: 'pH', color: '#aaa' }, ticks: { color: '#ddd' } }
          }
        }
      });
    }
    function pushHistory() {
      state.tempHistory.push(state.waterTemp);
      state.phHistory.push(state.ph);
      state.voltHistory.push(state.voltage);
      if (state.tempHistory.length > 20) state.tempHistory.shift();
      if (state.phHistory.length > 20) state.phHistory.shift();
      if (state.voltHistory.length > 20) state.voltHistory.shift();
      if (chart) chart.update();
    }

    // ========== SIMULASI SENSOR ==========
    function startSensorSim() {
      if (sensorInterval) clearInterval(sensorInterval);
      sensorInterval = setInterval(() => {
        // Level air
        let newLevel = state.waterLevel;
        const rand = Math.random();
        if (state.rdfOn && !state.pumpOnly) {
          if (rand < 0.3) newLevel = 'LOW';
          else if (rand < 0.7) newLevel = 'MEDIUM';
          else newLevel = 'HIGH';
        } else if (!state.rdfOn && !state.pumpOnly) {
          if (rand < 0.2) newLevel = 'LOW';
          else if (rand < 0.6) newLevel = 'MEDIUM';
          else newLevel = 'HIGH';
        } else {
          const lvl = ['LOW','MEDIUM','HIGH'];
          newLevel = lvl[Math.floor(Math.random()*3)];
        }
        state.waterLevel = newLevel;
        // Arus drum
        if (state.rdfOn) {
          state.drumCurrent = parseFloat((1.2 + Math.random() * 1.0).toFixed(2));
        } else {
          state.drumCurrent = parseFloat((0.1 + Math.random() * 0.2).toFixed(2));
        }
        // Tegangan
        state.voltage = parseFloat((Math.min(13.5, Math.max(11.0, state.voltage + (Math.random()-0.5)*0.1)).toFixed(1)));
        // Flow rate
        let flow = 0;
        if (state.pumpOnly || (!state.drumOnly && state.rdfOn)) flow = 60 + Math.random()*40;
        else if (state.drumOnly && state.rdfOn) flow = 20 + Math.random()*20;
        else flow = 5 + Math.random()*15;
        state.flowRate = parseFloat(flow.toFixed(1));
        // Suhu & pH
        state.waterTemp = parseFloat((state.waterTemp + (Math.random()-0.5)*0.15).toFixed(1));
        state.ph = parseFloat((state.ph + (Math.random()-0.5)*0.05).toFixed(2));
        state.power = parseFloat((state.voltage * state.drumCurrent).toFixed(1));

        if (state.drumCurrent > state.thresholds.maxCurrent) addNotif(`⚠️ Arus tinggi: ${state.drumCurrent}A`, 'error');
        if (state.ph < state.thresholds.minPh || state.ph > state.thresholds.maxPh) addNotif(`⚠️ pH tidak normal: ${state.ph}`, 'error');
        if (state.waterTemp > state.thresholds.maxTemp) addNotif(`🌡️ Suhu tinggi: ${state.waterTemp}°C`, 'error');

        pushHistory();
        updateSensorUI();
        updateAlerts();
        updateUI();
      }, 2500);
    }

    function updateSensorUI() {
      const setText = (id, val) => { let el = document.getElementById(id); if(el) el.innerText = val; };
      setText('sensorLevel', state.waterLevel);
      setText('sensorCurrent', state.drumCurrent + ' A');
      setText('sensorVoltage', state.voltage + ' V');
      setText('sensorFlow', state.flowRate + ' L/min');
      setText('sensorTemp', state.waterTemp + '°C');
      setText('sensorPH', state.ph);
      setText('powerWatts', state.power + ' W');
    }
    function updateAlerts() {
      const currCard = document.getElementById('sensorCurrentCard');
      const phCard = document.getElementById('sensorPHCard');
      const tempCard = document.getElementById('sensorTempCard');
      if (currCard) {
        if (state.drumCurrent > state.thresholds.maxCurrent) currCard.classList.add('blink-red');
        else currCard.classList.remove('blink-red');
      }
      if (phCard) {
        if (state.ph < state.thresholds.minPh || state.ph > state.thresholds.maxPh) phCard.classList.add('blink-red');
        else phCard.classList.remove('blink-red');
      }
      if (tempCard) {
        if (state.waterTemp > state.thresholds.maxTemp) tempCard.classList.add('blink-red');
        else tempCard.classList.remove('blink-red');
      }
    }
    function updateLogUI() {
      const container = document.getElementById('logContainer');
      if (!container) return;
      if (state.logs.length === 0) { container.innerHTML = '<div class="text-center opacity-50 py-3">Belum ada aktivitas</div>'; return; }
      container.innerHTML = state.logs.map(l => `<div class="log-item"><span style="color:#a855f7; width:65px;">${l.time}</span><span style="font-weight:600; width:80px;">${l.action}:</span><span>${l.detail}</span></div>`).join('');
    }
    function updateNotifUI() {
      const container = document.getElementById('notifContainer');
      if (!container) return;
      container.innerHTML = state.notifications.map(n => `<div class="toast" style="border-left-color: ${n.type==='error'?'#ef4444':n.type==='success'?'#22c55e':'#a855f7'}"><i class="fas ${n.type==='error'?'fa-exclamation-triangle':n.type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${n.msg}</div>`).join('');
    }
    function updateUI() {
      // Status RDF
      const rdfStatus = document.getElementById('rdfStatus');
      if (rdfStatus) {
        rdfStatus.innerText = state.rdfOn ? 'BERJALAN' : 'BERHENTI';
        rdfStatus.className = `px-3 py-1 rounded-full text-xs font-bold ${state.rdfOn ? 'bg-green-500/40' : 'bg-red-500/40'}`;
      }
      // Tombol RDF
      const rdfBtn = document.getElementById('toggleRdfBtn');
      if (rdfBtn) {
        rdfBtn.innerHTML = `<i class="fas ${state.rdfOn ? 'fa-stop-circle' : 'fa-play-circle'}"></i> ${state.rdfOn ? 'Matikan RDF' : 'Nyalakan RDF'}`;
      }
      // Segmented control active class
      const segPump = document.getElementById('segPumpOnly');
      const segDrum = document.getElementById('segDrumOnly');
      const segNormal = document.getElementById('segNormal');
      if (segPump) segPump.classList.toggle('active', state.pumpOnly);
      if (segDrum) segDrum.classList.toggle('active', state.drumOnly);
      if (segNormal) segNormal.classList.toggle('active', !state.pumpOnly && !state.drumOnly);
      // Aerator & UV
      const aeratorBtn = document.getElementById('aeratorBtn');
      const uvBtn = document.getElementById('uvBtn');
      if (aeratorBtn) {
        aeratorBtn.innerHTML = `<i class="fas fa-fan"></i> Aerator ${state.aeratorOn?'ON':'OFF'}`;
        aeratorBtn.classList.toggle('bg-green-600', state.aeratorOn);
      }
      if (uvBtn) {
        uvBtn.innerHTML = `<i class="fas fa-sun"></i> UV Lamp ${state.uvOn?'ON':'OFF'}`;
        uvBtn.classList.toggle('bg-purple-600', state.uvOn);
      }
      // Mode info (teks tambahan)
      const modeInfo = document.getElementById('modeInfo');
      if (modeInfo) {
        if (state.pumpOnly) modeInfo.innerText = 'Pump Only';
        else if (state.drumOnly) modeInfo.innerText = 'Drum Only';
        else if (state.schedules.length > 0) modeInfo.innerText = 'Scheduled';
        else modeInfo.innerText = 'Manual';
      }
      // Koneksi ESP32
      const connStatus = document.getElementById('connStatus');
      if (connStatus) {
        connStatus.innerHTML = `<i class="fas fa-circle" style="color: #22c55e; font-size: 0.6rem;"></i> Online`;
      }
    }

    // ========== KONTROL ==========
    function toggleRdf() {
      // Jika mode Pump Only atau Drum Only aktif, reset dulu
      if (state.pumpOnly) setMode('normal');
      if (state.drumOnly) setMode('normal');
      state.rdfOn = !state.rdfOn;
      addLog('Manual', `RDF ${state.rdfOn ? 'ON' : 'OFF'}`);
      addNotif(`RDF ${state.rdfOn ? 'ON' : 'OFF'}`, state.rdfOn ? 'success' : 'error');
      updateUI();
    }
    function setMode(mode) {
      if (mode === 'pump') {
        state.pumpOnly = true;
        state.drumOnly = false;
        state.rdfOn = false;
        addLog('Mode', 'Pump Only aktif');
        addNotif('Mode Pump Only', 'info');
      } else if (mode === 'drum') {
        state.drumOnly = true;
        state.pumpOnly = false;
        state.rdfOn = true;
        addLog('Mode', 'Drum Only aktif');
        addNotif('Mode Drum Only', 'info');
      } else { // normal
        state.pumpOnly = false;
        state.drumOnly = false;
        addLog('Mode', 'Mode Normal');
        addNotif('Mode Normal', 'info');
      }
      updateUI();
    }
    function toggleAerator() { state.aeratorOn = !state.aeratorOn; addLog('Aerator', state.aeratorOn ? 'ON' : 'OFF'); addNotif(`Aerator ${state.aeratorOn?'ON':'OFF'}`); updateUI(); }
    function toggleUV() { state.uvOn = !state.uvOn; addLog('UV Lamp', state.uvOn ? 'ON' : 'OFF'); addNotif(`UV Lamp ${state.uvOn?'ON':'OFF'}`); updateUI(); }
    function emergencyStop() {
      if (confirm("⚠️ EMERGENCY STOP! Semua perangkat akan dimatikan. Lanjutkan?")) {
        state.rdfOn = false; state.pumpOnly = false; state.drumOnly = false; state.aeratorOn = false; state.uvOn = false;
        addLog('EMERGENCY', 'Semua perangkat dimatikan!'); addNotif('🚨 EMERGENCY STOP', 'error'); beep(); updateUI();
      }
    }
    function resetSystem() {
      if (confirm("Reset semua pengaturan ke default. Lanjutkan?")) {
        state.rdfOn = false; state.pumpOnly = false; state.drumOnly = false; state.aeratorOn = false; state.uvOn = false;
        state.schedules = [];
        addLog('System', 'Reset semua parameter'); addNotif('System direset', 'success');
        updateUI(); updateScheduleUI();
      }
    }
    function exportLogs() {
      if (state.logs.length === 0) { addNotif('Tidak ada log', 'info'); return; }
      let csv = [["Waktu","Aksi","Detail"]];
      state.logs.forEach(l => csv.push([l.time, l.action, l.detail]));
      const blob = new Blob([csv.map(r=>r.join(",")).join("\n")], {type:"text/csv"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `nusaflow_logs_${Date.now()}.csv`;
      a.click(); URL.revokeObjectURL(a.href);
      addLog('Export', 'Log diekspor');
    }
    function openSettings() {
      let mc = prompt('Max arus (A):', state.thresholds.maxCurrent);
      let minph = prompt('Min pH:', state.thresholds.minPh);
      let maxph = prompt('Max pH:', state.thresholds.maxPh);
      let mt = prompt('Max suhu (°C):', state.thresholds.maxTemp);
      if (mc) state.thresholds.maxCurrent = parseFloat(mc);
      if (minph) state.thresholds.minPh = parseFloat(minph);
      if (maxph) state.thresholds.maxPh = parseFloat(maxph);
      if (mt) state.thresholds.maxTemp = parseFloat(mt);
      addLog('Settings', 'Threshold diperbarui'); addNotif('Threshold disimpan', 'success');
    }

    // ========== SCHEDULE ==========
    function addSchedule(hour, minute, onOff) {
      if (isNaN(hour) || isNaN(minute) || hour<0 || hour>23 || minute<0 || minute>59) {
        addNotif('Jam atau menit tidak valid', 'error');
        return;
      }
      state.schedules.push({ id: Date.now(), hour, minute, onOff });
      addLog('Schedule', `Jadwal ${hour}:${minute} RDF ${onOff?'ON':'OFF'}`);
      updateScheduleUI();
    }
    function removeSchedule(id) {
      state.schedules = state.schedules.filter(s => s.id !== id);
      updateScheduleUI();
    }
    function clearSchedules() {
      state.schedules = [];
      updateScheduleUI();
      addLog('Schedule', 'Semua jadwal dihapus');
    }
    function updateScheduleUI() {
      const container = document.getElementById('scheduleList');
      if (!container) return;
      if (state.schedules.length === 0) { container.innerHTML = '<div class="text-center text-xs opacity-60">Belum ada jadwal</div>'; return; }
      container.innerHTML = state.schedules.map(s => `
        <div class="flex justify-between items-center bg-white/10 rounded-xl p-2 mb-2">
          <span class="text-sm font-mono">${s.hour.toString().padStart(2,'0')}:${s.minute.toString().padStart(2,'0')} → ${s.onOff ? 'ON' : 'OFF'}</span>
          <button onclick="window.removeSchedule(${s.id})" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button>
        </div>
      `).join('');
    }
    window.removeSchedule = removeSchedule;
    window.addScheduleFromUI = () => {
      const hour = parseInt(document.getElementById('scheduleHour').value);
      const min = parseInt(document.getElementById('scheduleMinute').value);
      const onOff = document.getElementById('scheduleAction').value === 'on';
      addSchedule(hour, min, onOff);
    };
    function startScheduleChecker() {
      if (scheduleInterval) clearInterval(scheduleInterval);
      scheduleInterval = setInterval(() => {
        const now = new Date();
        const curHour = now.getHours(), curMin = now.getMinutes();
        state.schedules.forEach(s => {
          if (s.hour === curHour && s.minute === curMin) {
            if (s.onOff && !state.rdfOn) toggleRdf();
            else if (!s.onOff && state.rdfOn) toggleRdf();
            addLog('Schedule', `Eksekusi jadwal ${s.hour}:${s.minute}`);
          }
        });
      }, 60000);
    }

    // ========== RENDER UI ==========
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="container">
          <div class="header">
            <div><h1>NusaFlow Koi</h1><p>RDF Smart Control System</p></div>
            <div class="clock">
              <div class="clock-time" id="clockTime">--:--:--</div>
              <div class="clock-date" id="clockDate">---</div>
            </div>
          </div>

          <!-- RDF Control -->
          <div class="card">
            <h3 style="margin-bottom:12px;"><i class="fas fa-water-pump"></i> RDF Drum Filter</h3>
            <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
              <span>Status</span>
              <span id="rdfStatus" class="px-3 py-1 rounded-full text-xs bg-red-500/40">BERHENTI</span>
            </div>
            <button id="toggleRdfBtn" class="btn-primary" style="width:100%;"><i class="fas fa-play-circle"></i> Nyalakan RDF</button>
          </div>

          <!-- Mode Operasi dengan Segmented Control -->
          <div class="card">
            <h3 style="margin-bottom:12px;"><i class="fas fa-sliders-h"></i> Mode Operasi</h3>
            <div class="segmented-control">
              <button id="segPumpOnly">💧 Pump Only</button>
              <button id="segDrumOnly">⚙️ Drum Only</button>
              <button id="segNormal">🔄 Normal</button>
            </div>
            <div class="text-xs opacity-80 text-center mt-2">Mode aktif: <span id="modeInfo">Manual</span></div>
          </div>

          <!-- Timer Schedule -->
          <div class="card">
            <h3 style="margin-bottom:12px;"><i class="fas fa-clock"></i> Timer Otomatis</h3>
            <div style="display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;">
              <input type="number" id="scheduleHour" placeholder="Jam" style="width:70px;">
              <input type="number" id="scheduleMinute" placeholder="Menit" style="width:70px;">
              <select id="scheduleAction" style="width:70px;"><option value="on">ON</option><option value="off">OFF</option></select>
              <button id="addScheduleBtn" class="bg-purple-600 px-3 rounded-full">+</button>
            </div>
            <div id="scheduleList" class="max-h-32 overflow-y-auto"></div>
            <button id="clearSchedulesBtn" class="text-xs text-red-300 mt-2">Hapus Semua Jadwal</button>
          </div>

          <!-- Perangkat Tambahan -->
          <div class="card">
            <h3 style="margin-bottom:12px;"><i class="fas fa-plug"></i> Perangkat Tambahan</h3>
            <div style="display:flex; gap:10px;">
              <button id="aeratorBtn" style="flex:1;"><i class="fas fa-fan"></i> Aerator OFF</button>
              <button id="uvBtn" style="flex:1;"><i class="fas fa-sun"></i> UV Lamp OFF</button>
            </div>
          </div>

          <!-- Tombol Aksi (Reset, Threshold, Export) terpisah dari monitoring -->
          <div class="action-group">
            <button id="resetBtn" class="btn-warning"><i class="fas fa-undo-alt"></i> Reset</button>
            <button id="settingsBtn" style="background:rgba(255,255,255,0.1);"><i class="fas fa-cog"></i> Threshold</button>
            <button id="exportLogBtn" style="background:rgba(34,197,94,0.3);"><i class="fas fa-download"></i> Export</button>
          </div>

          <!-- Emergency Stop -->
          <button id="emergencyBtn" class="emergency btn-danger" style="width:100%; margin-bottom:20px;"><i class="fas fa-exclamation-triangle"></i> EMERGENCY STOP</button>

          <!-- Sensor Grid -->
          <div class="sensor-grid">
            <div id="sensorLevelCard" class="sensor-item"><i class="fas fa-water"></i><div class="sensor-value" id="sensorLevel">MEDIUM</div><div class="text-xs">Level Air</div></div>
            <div id="sensorCurrentCard" class="sensor-item"><i class="fas fa-bolt"></i><div class="sensor-value" id="sensorCurrent">0.8 A</div><div class="text-xs">Arus Drum</div></div>
            <div class="sensor-item"><i class="fas fa-charging-station"></i><div class="sensor-value" id="sensorVoltage">12.3 V</div><div class="text-xs">Tegangan</div></div>
            <div class="sensor-item"><i class="fas fa-tachometer-alt"></i><div class="sensor-value" id="sensorFlow">85 L/min</div><div class="text-xs">Flow Rate</div></div>
            <div id="sensorTempCard" class="sensor-item"><i class="fas fa-thermometer-half"></i><div class="sensor-value" id="sensorTemp">26.5°C</div><div class="text-xs">Suhu</div></div>
            <div id="sensorPHCard" class="sensor-item"><i class="fas fa-flask"></i><div class="sensor-value" id="sensorPH">7.2</div><div class="text-xs">pH</div></div>
            <div class="sensor-item"><i class="fas fa-charging-station"></i><div class="sensor-value" id="powerWatts">0 W</div><div class="text-xs">Daya</div></div>
            <div class="sensor-item"><i class="fas fa-wifi"></i><div class="sensor-value" id="connStatus"><i class="fas fa-circle" style="color:#22c55e; font-size:0.6rem;"></i> Online</div><div class="text-xs">ESP32</div></div>
          </div>

          <!-- Grafik -->
          <div class="card" style="padding:12px;">
            <h3 style="font-size:1rem; margin-bottom:8px;"><i class="fas fa-chart-line"></i> Tren Sensor (20 data)</h3>
            <div style="height:180px;"><canvas id="trendChart"></canvas></div>
          </div>

          <!-- Katalog Produk -->
          <div class="card" style="padding:12px;">
            <h3 style="font-size:1rem; margin-bottom:10px;"><i class="fab fa-instagram"></i> Katalog Produk RDF</h3>
            <div class="product-grid">
              <div class="product-card" onclick="window.showProduct('1 Ton')">
                <img src="https://placehold.co/200x150?text=RDF+1+Ton" alt="RDF 1 Ton" onerror="this.src='https://placehold.co/200x150?text=RDF+1+Ton'">
                <div class="font-bold mt-2">RDF 1 Ton</div>
                <div class="text-xs">Kapasitas 1000L</div>
              </div>
              <div class="product-card" onclick="window.showProduct('3 Ton')">
                <img src="https://placehold.co/200x150?text=RDF+3+Ton" alt="RDF 3 Ton" onerror="this.src='https://placehold.co/200x150?text=RDF+3+Ton'">
                <div class="font-bold mt-2">RDF 3 Ton</div>
                <div class="text-xs">Kapasitas 3000L</div>
              </div>
              <div class="product-card" onclick="window.showProduct('5 Ton')">
                <img src="https://placehold.co/200x150?text=RDF+5+Ton" alt="RDF 5 Ton" onerror="this.src='https://placehold.co/200x150?text=RDF+5+Ton'">
                <div class="font-bold mt-2">RDF 5 Ton</div>
                <div class="text-xs">Kapasitas 5000L</div>
              </div>
              <div class="product-card" onclick="window.showProduct('Custom')">
                <img src="https://placehold.co/200x150?text=Custom" alt="Custom" onerror="this.src='https://placehold.co/200x150?text=Custom'">
                <div class="font-bold mt-2">Custom</div>
                <div class="text-xs">Sesuai kebutuhan</div>
              </div>
            </div>
            <p class="text-center text-[10px] opacity-50 mt-2">Klik untuk info produk</p>
          </div>

          <!-- Log Aktivitas -->
          <div class="card" style="padding:12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <h3 style="font-size:1rem;"><i class="fas fa-list-alt"></i> Log Aktivitas</h3>
              <button id="clearLogBtn" class="text-xs bg-white/10 px-3 py-1 rounded-full">Clear</button>
            </div>
            <div id="logContainer" class="log-area"></div>
          </div>

          <div class="text-center text-[9px] opacity-40 mt-4">NusaFlow Koi Pro • RDF Founder Edition • Simulasi Real-time</div>
        </div>
        <div id="notifContainer"></div>
      `;

      // Event listeners
      document.getElementById('toggleRdfBtn')?.addEventListener('click', toggleRdf);
      document.getElementById('segPumpOnly')?.addEventListener('click', () => setMode('pump'));
      document.getElementById('segDrumOnly')?.addEventListener('click', () => setMode('drum'));
      document.getElementById('segNormal')?.addEventListener('click', () => setMode('normal'));
      document.getElementById('emergencyBtn')?.addEventListener('click', emergencyStop);
      document.getElementById('aeratorBtn')?.addEventListener('click', toggleAerator);
      document.getElementById('uvBtn')?.addEventListener('click', toggleUV);
      document.getElementById('resetBtn')?.addEventListener('click', resetSystem);
      document.getElementById('settingsBtn')?.addEventListener('click', openSettings);
      document.getElementById('exportLogBtn')?.addEventListener('click', exportLogs);
      document.getElementById('clearLogBtn')?.addEventListener('click', () => { state.logs = []; updateLogUI(); });
      document.getElementById('addScheduleBtn')?.addEventListener('click', () => window.addScheduleFromUI());
      document.getElementById('clearSchedulesBtn')?.addEventListener('click', clearSchedules);

      // Mulai jam
      updateClock();
      clockInterval = setInterval(updateClock, 1000);

      updateUI();
      updateSensorUI();
      updateLogUI();
      updateScheduleUI();
      initChart();
      startSensorSim();
      startScheduleChecker();
    }

    window.showProduct = (name) => {
      addNotif(`📦 Produk RDF ${name} - Hubungi CS untuk info lebih lanjut`, 'info');
    };

    render();
  })();
</script>
</body>
</html>
