<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NusaFlow Koi | RDF Control System</title>
  <!-- Font Awesome 6 (gratis) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #00172e, #000b17);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }

    /* Container utama */
    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* Glassmorphism iOS style */
    .glass {
      background: rgba(20, 35, 60, 0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .glass:hover {
      background: rgba(30, 50, 80, 0.65);
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
    }

    /* Tombol */
    button {
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 40px;
      padding: 10px 16px;
      font-weight: 600;
    }
    button:active {
      transform: scale(0.96);
    }
    button.primary {
      background: #007aff;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
    }
    button.danger {
      background: #ff3b30;
    }
    button.warning {
      background: #ff9500;
    }

    /* Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    @media (min-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr 2fr;
      }
    }
    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .sensor-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Loading screen */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #001d3d, #000b17);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s;
    }
    .loading-content {
      text-align: center;
    }
    .loading-bar {
      width: 250px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .loading-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #00b4ff);
      transition: width 0.2s;
    }

    /* Toast notifikasi */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      animation: slideIn 0.3s ease;
      border-left: 4px solid;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .log-area {
      max-height: 180px;
      overflow-y: auto;
      font-size: 0.75rem;
    }
    .log-item {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 6px 0;
      display: flex;
      gap: 8px;
    }
    .badge {
      background: rgba(0,0,0,0.4);
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.7rem;
    }
    input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      padding: 8px 12px;
      color: white;
      width: 100%;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // ======================== VANILLA JS DASHBOARD ========================
  (function() {
    // ----- Loading screen -----
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading';
    loadingDiv.innerHTML = `
      <div class="loading-content">
        <div style="font-size: 3rem; font-weight: 800; letter-spacing: 2px;">NUSA<span style="color:#3b82f6;">FLOW</span></div>
        <div style="font-size: 0.7rem; opacity:0.7; margin-top: 6px;">Koi Pond RDF System</div>
        <div class="loading-bar"><div class="loading-progress" id="loadingProgress"></div></div>
        <div style="margin-top: 12px; font-size:0.8rem;" id="loadingPercent">0%</div>
      </div>
    `;
    document.body.appendChild(loadingDiv);
    
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 15 + 5;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        setTimeout(() => {
          loadingDiv.style.opacity = '0';
          setTimeout(() => loadingDiv.remove(), 500);
        }, 300);
      }
      const progEl = document.getElementById('loadingProgress');
      const percentEl = document.getElementById('loadingPercent');
      if (progEl) progEl.style.width = Math.min(progress, 100) + '%';
      if (percentEl) percentEl.innerText = Math.floor(Math.min(progress, 100)) + '%';
    }, 150);
    
    // ----- State Management -----
    let state = {
      rdfRunning: false,       // drum filter
      pumpOnlyMode: false,
      drumOnlyMode: false,
      timerEnabled: false,
      timerOnSec: 30,
      timerOffSec: 120,
      timerRemaining: 0,
      timerState: 'OFF',      // 'ON' or 'OFF'
      waterLevel: 'MEDIUM',
      drumCurrent: 0.8,
      voltage: 12.3,
      flowRate: 85,
      waterTemp: 26.5,
      phValue: 7.2,
      logs: [],
      notifications: []
    };
    
    let timerInterval = null;
    
    // Helper: add log & notif
    function addLog(action, detail) {
      const time = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      state.logs = [{ id: Date.now(), time, action, detail }, ...state.logs].slice(0, 40);
      updateLogUI();
    }
    
    function addNotification(msg, type = 'info') {
      const id = Date.now();
      state.notifications = [...state.notifications, { id, msg, type }];
      updateNotificationsUI();
      setTimeout(() => {
        state.notifications = state.notifications.filter(n => n.id !== id);
        updateNotificationsUI();
      }, 3800);
    }
    
    // Timer logic
    function startTimerCycle() {
      if (timerInterval) clearInterval(timerInterval);
      state.timerEnabled = true;
      state.timerState = 'ON';
      state.timerRemaining = state.timerOnSec;
      state.rdfRunning = true;
      addLog('Timer', `RDF menyala selama ${state.timerOnSec} detik`);
      addNotification(`Timer mulai: RDF ON ${state.timerOnSec}s`, 'success');
      updateUI();
      
      timerInterval = setInterval(() => {
        if (state.timerRemaining <= 1) {
          if (state.timerState === 'ON') {
            // Matikan RDF
            state.rdfRunning = false;
            state.timerState = 'OFF';
            state.timerRemaining = state.timerOffSec;
            addLog('Timer', `RDF mati selama ${state.timerOffSec} detik`);
            addNotification(`RDF OFF ${state.timerOffSec}s`, 'info');
          } else {
            // Nyalakan RDF
            state.rdfRunning = true;
            state.timerState = 'ON';
            state.timerRemaining = state.timerOnSec;
            addLog('Timer', `RDF menyala kembali ${state.timerOnSec} detik`);
            addNotification(`RDF ON kembali`, 'success');
          }
          updateUI();
        } else {
          state.timerRemaining--;
          updateTimerUI();
        }
      }, 1000);
      updateTimerUI();
    }
    
    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      state.timerEnabled = false;
      state.timerRemaining = 0;
      addLog('Timer', 'Timer dihentikan manual');
      addNotification('Timer RDF dihentikan', 'info');
      updateUI();
    }
    
    // Toggle RDF manual
    function toggleRdf() {
      if (state.pumpOnlyMode) state.pumpOnlyMode = false;
      if (state.drumOnlyMode) state.drumOnlyMode = false;
      if (state.timerEnabled) stopTimer();
      state.rdfRunning = !state.rdfRunning;
      addLog('Manual', `RDF ${state.rdfRunning ? 'Dinyalakan' : 'Dimatikan'}`);
      addNotification(`RDF ${state.rdfRunning ? 'ON' : 'OFF'} (manual)`, state.rdfRunning ? 'success' : 'error');
      updateUI();
    }
    
    // Mode pump only / drum only
    function setPumpOnly(enable) {
      if (enable) {
        state.pumpOnlyMode = true;
        state.drumOnlyMode = false;
        if (state.timerEnabled) stopTimer();
        state.rdfRunning = false; // drum mati
        addLog('Mode', 'Pump Only aktif - Pompa menyala, Drum mati');
        addNotification('Mode Pump Only aktif', 'info');
      } else {
        state.pumpOnlyMode = false;
      }
      updateUI();
    }
    function setDrumOnly(enable) {
      if (enable) {
        state.drumOnlyMode = true;
        state.pumpOnlyMode = false;
        if (state.timerEnabled) stopTimer();
        state.rdfRunning = true; // drum hidup
        addLog('Mode', 'Drum Only aktif - Drum menyala, Pompa mati');
        addNotification('Mode Drum Only aktif', 'info');
      } else {
        state.drumOnlyMode = false;
      }
      updateUI();
    }
    function setNormalMode() {
      state.pumpOnlyMode = false;
      state.drumOnlyMode = false;
      addLog('Mode', 'Mode Normal (manual/timer)');
      addNotification('Mode Normal', 'info');
      updateUI();
    }
    
    function resetSystem() {
      state.rdfRunning = false;
      state.pumpOnlyMode = false;
      state.drumOnlyMode = false;
      if (state.timerEnabled) stopTimer();
      state.timerEnabled = false;
      state.timerRemaining = 0;
      addLog('System', 'Reset semua kontrol ke default');
      addNotification('System direset', 'success');
      updateUI();
    }
    
    // Simulasi sensor (setiap 2.5 detik)
    function startSensorSimulation() {
      setInterval(() => {
        // Level air dipengaruhi rdfRunning dan mode
        let newLevel = state.waterLevel;
        const rand = Math.random();
        if (state.rdfRunning && !state.pumpOnlyMode) {
          if (rand < 0.3) newLevel = 'LOW';
          else if (rand < 0.7) newLevel = 'MEDIUM';
          else newLevel = 'HIGH';
        } else if (!state.rdfRunning && !state.pumpOnlyMode) {
          if (rand < 0.2) newLevel = 'LOW';
          else if (rand < 0.6) newLevel = 'MEDIUM';
          else newLevel = 'HIGH';
        } else {
          const levels = ['LOW','MEDIUM','HIGH'];
          newLevel = levels[Math.floor(Math.random()*3)];
        }
        state.waterLevel = newLevel;
        
        // Arus drum
        if (state.rdfRunning) {
          state.drumCurrent = parseFloat((0.8 + Math.random() * 1.0).toFixed(2));
        } else {
          state.drumCurrent = parseFloat((0.1 + Math.random() * 0.2).toFixed(2));
        }
        // Tegangan
        state.voltage = parseFloat((Math.min(13.2, Math.max(11.2, state.voltage + (Math.random()-0.5)*0.15)).toFixed(1)));
        // Flow rate
        let baseFlow = 0;
        if (state.pumpOnlyMode || (!state.drumOnlyMode && state.rdfRunning)) baseFlow = 60 + Math.random() * 40;
        else if (state.drumOnlyMode && state.rdfRunning) baseFlow = 20 + Math.random() * 20;
        else baseFlow = 5 + Math.random() * 15;
        state.flowRate = parseFloat(baseFlow.toFixed(1));
        // Suhu
        state.waterTemp = parseFloat((state.waterTemp + (Math.random()-0.5)*0.2).toFixed(1));
        // pH
        state.phValue = parseFloat((state.phValue + (Math.random()-0.5)*0.05).toFixed(2));
        
        // Peringatan bahaya
        if (state.drumCurrent > 2.5) addNotification(`⚠️ Arus drum tinggi: ${state.drumCurrent}A`, 'error');
        if (state.phValue < 6.0 || state.phValue > 8.5) addNotification(`⚠️ pH tidak ideal: ${state.phValue}`, 'error');
        if (state.waterTemp > 32) addNotification(`🌡️ Suhu tinggi: ${state.waterTemp}°C`, 'error');
        
        updateUI();
        updateSensorUI();
      }, 2500);
    }
    
    // Update UI elements
    function updateUI() {
      // Update status RDF
      const rdfStatus = document.getElementById('rdfStatus');
      if (rdfStatus) {
        rdfStatus.innerText = state.rdfRunning ? 'BERJALAN' : 'BERHENTI';
        rdfStatus.className = `badge ${state.rdfRunning ? 'bg-green-500/40' : 'bg-red-500/40'}`;
      }
      // Mode buttons highlight
      document.getElementById('btnPumpOnly')?.classList.toggle('primary', state.pumpOnlyMode);
      document.getElementById('btnDrumOnly')?.classList.toggle('primary', state.drumOnlyMode);
      document.getElementById('btnNormal')?.classList.toggle('primary', !state.pumpOnlyMode && !state.drumOnlyMode && !state.timerEnabled);
      // Timer UI
      const timerPanel = document.getElementById('timerPanel');
      if (timerPanel) {
        if (state.timerEnabled) {
          timerPanel.innerHTML = `
            <div style="text-align:center">
              <div style="font-size:2rem; font-weight:bold; font-family:monospace">${formatTime(state.timerRemaining)}</div>
              <div class="badge" style="margin:8px 0">Status: ${state.timerState === 'ON' ? 'RDF ON' : 'RDF OFF'}</div>
              <button class="danger" id="stopTimerBtn">Stop Timer</button>
            </div>
          `;
          const stopBtn = document.getElementById('stopTimerBtn');
          if (stopBtn) stopBtn.onclick = () => stopTimer();
        } else {
          timerPanel.innerHTML = `
            <div class="grid-2" style="grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px">
              <div><label style="font-size:0.7rem">ON (detik)</label><input type="number" id="timerOnInput" value="${state.timerOnSec}" min="1"></div>
              <div><label style="font-size:0.7rem">OFF (detik)</label><input type="number" id="timerOffInput" value="${state.timerOffSec}" min="1"></div>
            </div>
            <button class="primary" id="startTimerBtn" style="width:100%">Aktifkan Timer Otomatis</button>
          `;
          const startBtn = document.getElementById('startTimerBtn');
          const onInput = document.getElementById('timerOnInput');
          const offInput = document.getElementById('timerOffInput');
          if (startBtn) {
            startBtn.onclick = () => {
              state.timerOnSec = parseInt(onInput?.value || 30);
              state.timerOffSec = parseInt(offInput?.value || 120);
              startTimerCycle();
            };
          }
        }
      }
      // Tombol RDF utama
      const toggleBtn = document.getElementById('toggleRdfBtn');
      if (toggleBtn) {
        toggleBtn.innerHTML = `<i class="fas ${state.rdfRunning ? 'fa-stop-circle' : 'fa-play-circle'}"></i> ${state.rdfRunning ? 'Matikan RDF' : 'Nyalakan RDF'}`;
      }
      // Mode indicator
      const modeInfo = document.getElementById('modeInfo');
      if (modeInfo) {
        if (state.pumpOnlyMode) modeInfo.innerText = 'Pump Only';
        else if (state.drumOnlyMode) modeInfo.innerText = 'Drum Only';
        else if (state.timerEnabled) modeInfo.innerText = 'Timer';
        else modeInfo.innerText = 'Manual';
      }
    }
    
    function updateTimerUI() {
      const timerDisplay = document.querySelector('#timerPanel .timerDisplay');
      if (timerDisplay) timerDisplay.innerText = formatTime(state.timerRemaining);
    }
    
    function updateSensorUI() {
      const levelEl = document.getElementById('sensorLevel');
      if (levelEl) levelEl.innerText = state.waterLevel;
      const currentEl = document.getElementById('sensorCurrent');
      if (currentEl) currentEl.innerText = state.drumCurrent + ' A';
      const voltEl = document.getElementById('sensorVoltage');
      if (voltEl) voltEl.innerText = state.voltage + ' V';
      const flowEl = document.getElementById('sensorFlow');
      if (flowEl) flowEl.innerText = state.flowRate + ' L/min';
      const tempEl = document.getElementById('sensorTemp');
      if (tempEl) tempEl.innerText = state.waterTemp + '°C';
      const phEl = document.getElementById('sensorPH');
      if (phEl) phEl.innerText = state.phValue;
    }
    
    function updateLogUI() {
      const logContainer = document.getElementById('logContainer');
      if (!logContainer) return;
      if (state.logs.length === 0) {
        logContainer.innerHTML = '<div class="opacity-50 text-center">Belum ada aktivitas</div>';
        return;
      }
      logContainer.innerHTML = state.logs.map(log => `
        <div class="log-item">
          <span style="color:#60a5fa; width:65px">${log.time}</span>
          <span style="font-weight:600; width:80px">${log.action}:</span>
          <span>${log.detail}</span>
        </div>
      `).join('');
    }
    
    function updateNotificationsUI() {
      const notifContainer = document.getElementById('notifContainer');
      if (!notifContainer) return;
      notifContainer.innerHTML = state.notifications.map(n => `
        <div class="toast" style="border-left-color: ${n.type === 'error' ? '#ff3b30' : n.type === 'success' ? '#34c759' : '#007aff'}">
          <i class="fas ${n.type === 'error' ? 'fa-exclamation-triangle' : n.type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i>
          ${n.msg}
        </div>
      `).join('');
    }
    
    function formatTime(sec) {
      if (sec <= 0) return '0:00';
      const mins = Math.floor(sec / 60);
      const secs = sec % 60;
      return `${mins}:${secs.toString().padStart(2,'0')}`;
    }
    
    // Jam realtime
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      const dateStr = now.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
      const clockEl = document.getElementById('clockTime');
      const dateEl = document.getElementById('clockDate');
      if (clockEl) clockEl.innerText = timeStr;
      if (dateEl) dateEl.innerText = dateStr;
    }
    setInterval(updateClock, 1000);
    
    // Render seluruh UI (HTML)
    function renderApp() {
      const app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = `
        <div class="container">
          <!-- Header + Jam -->
          <div class="glass" style="padding: 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div>
              <h1 style="font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg,#90e0ff,#0077b6); -webkit-background-clip: text; background-clip: text; color: transparent;">NusaFlow Koi</h1>
              <p style="font-size: 0.7rem; opacity:0.7;">RDF Control • Kolam Ikan Koi</p>
            </div>
            <div style="text-align: right;">
              <div style="font-size: 1.6rem; font-weight: 600; letter-spacing: 1px;" id="clockTime">--:--:--</div>
              <div style="font-size: 0.7rem; opacity:0.7;" id="clockDate">---</div>
            </div>
          </div>
          
          <div class="grid-2">
            <!-- Kolom Kiri: Kontrol -->
            <div class="space-y-4" style="display: flex; flex-direction: column; gap: 1rem;">
              <div class="glass" style="padding: 20px;">
                <h3 style="margin-bottom: 12px;"><i class="fas fa-water-pump"></i> RDF Drum Filter</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                  <span>Status</span>
                  <span id="rdfStatus" class="badge">BERHENTI</span>
                </div>
                <button id="toggleRdfBtn" class="primary" style="width:100%"><i class="fas fa-play-circle"></i> Nyalakan RDF</button>
              </div>
              
              <div class="glass" style="padding: 20px;">
                <h3 style="margin-bottom: 12px;"><i class="fas fa-sliders-h"></i> Mode Operasi</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                  <button id="btnPumpOnly"><i class="fas fa-tint"></i> Pump Only</button>
                  <button id="btnDrumOnly"><i class="fas fa-cogs"></i> Drum Only</button>
                  <button id="btnNormal"><i class="fas fa-sync-alt"></i> Normal</button>
                </div>
                <div style="margin-top: 12px; font-size:0.75rem;">Mode saat ini: <span id="modeInfo">Manual</span></div>
              </div>
              
              <div class="glass" style="padding: 20px;">
                <h3 style="margin-bottom: 12px;"><i class="far fa-clock"></i> Timer RDF</h3>
                <div id="timerPanel"></div>
              </div>
              
              <button id="resetBtn" class="danger" style="background:#ff3b30; padding:12px"><i class="fas fa-undo-alt"></i> Reset System</button>
            </div>
            
            <!-- Kolom Kanan: Sensor & Log -->
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              <div class="glass" style="padding: 20px;">
                <h3 style="margin-bottom: 12px;"><i class="fas fa-microchip"></i> Monitoring Kolam</h3>
                <div class="sensor-grid">
                  <div><i class="fas fa-water"></i> Level Air: <strong id="sensorLevel">MEDIUM</strong></div>
                  <div><i class="fas fa-bolt"></i> Arus Drum: <strong id="sensorCurrent">0.8 A</strong></div>
                  <div><i class="fas fa-charging-station"></i> Tegangan: <strong id="sensorVoltage">12.3 V</strong></div>
                  <div><i class="fas fa-tachometer-alt"></i> Flow Rate: <strong id="sensorFlow">85 L/min</strong></div>
                  <div><i class="fas fa-thermometer-half"></i> Suhu: <strong id="sensorTemp">26.5°C</strong></div>
                  <div><i class="fas fa-flask"></i> pH: <strong id="sensorPH">7.2</strong></div>
                </div>
              </div>
              
              <div class="glass" style="padding: 20px;">
                <h3 style="margin-bottom: 12px;"><i class="fas fa-list-alt"></i> Log Aktivitas <button id="clearLogBtn" style="float:right; background:transparent; font-size:0.7rem;">Clear</button></h3>
                <div id="logContainer" class="log-area"></div>
              </div>
            </div>
          </div>
          <div style="text-align: center; font-size:0.6rem; opacity:0.4; margin-top: 24px;">NusaFlow Koi v3.0 • RDF Founder Edition • Simulasi lengkap</div>
        </div>
        <div id="notifContainer"></div>
      `;
      
      // Pasang event listeners setelah render
      document.getElementById('btnPumpOnly')?.addEventListener('click', () => setPumpOnly(true));
      document.getElementById('btnDrumOnly')?.addEventListener('click', () => setDrumOnly(true));
      document.getElementById('btnNormal')?.addEventListener('click', () => setNormalMode());
      document.getElementById('toggleRdfBtn')?.addEventListener('click', toggleRdf);
      document.getElementById('resetBtn')?.addEventListener('click', resetSystem);
      document.getElementById('clearLogBtn')?.addEventListener('click', () => { state.logs = []; updateLogUI(); addLog('System','Log dibersihkan'); });
      
      // Initial UI update
      updateUI();
      updateSensorUI();
      updateLogUI();
      updateClock();
      startSensorSimulation();
    }
    
    // Tunggu loading selesai lalu render
    const checkLoading = setInterval(() => {
      if (!document.getElementById('loadingProgress') || progress >= 100) {
        clearInterval(checkLoading);
        renderApp();
      }
    }, 200);
  })();
</script>
</body>
</html>
